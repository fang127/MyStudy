syntax = "proto3";

package tutorial.grpcdemo;

service DemoService {
  // 1) Simple unary RPC.
  rpc SayHello(HelloRequest) returns (HelloReply);

  // 2) Client streaming RPC.
  rpc UploadNumbers(stream Number) returns (SumReply);

  // 3) Server streaming RPC.
  rpc CountDown(CountDownRequest) returns (stream CountDownReply);

  // 4) Bidirectional streaming RPC.
  rpc Chat(stream ChatMessage) returns (stream ChatMessage);
}

message HelloRequest {
  string name = 1;
  uint32 delay_ms = 2;
}

message HelloReply {
  string message = 1;
  int64 server_unix_ms = 2;
}

message Number {
  int32 value = 1;
}

message SumReply {
  int64 sum = 1;
  uint32 count = 2;
}

message CountDownRequest {
  int32 from = 1;
  uint32 interval_ms = 2;
}

message CountDownReply {
  int32 current = 1;
}

message ChatMessage {
  string user = 1;
  string text = 2;
  int64 unix_ms = 3;
}
