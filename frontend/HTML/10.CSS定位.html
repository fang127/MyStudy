<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS定位</title>

    <style>
        .box1 {
            height: 350px;
            background-color: aquamarine;
        }

        .box-normal {
            width: 100px;
            height: 100px;
            background-color: red;
        }

        .box-relative {
            width: 100px;
            height: 100px;
            background-color: blue;
            position: relative; /* 设置为相对定位 */
            top: 50px; /* 向下移动50px */
            left: 50px; /* 向右移动50px */
            right: 50px; /* 向左移动50px */
            bottom: 50px; /* 向上移动50px */
        }

        .box-absolute {
            width: 100px;
            height: 100px;
            background-color: green;
            position: absolute; /* 设置为绝对定位 */
            top: 50px; /* 距离父元素顶部50px */
            left: 50px; /* 距离父元素左边50px */
        }

        .box2 {
            height: 350px;
            background-color: lightcoral;
            position: relative; /* 设置父元素为相对定位，使绝对定位的子元素以此为参考 */
        }

        .box3 {
            height: 350px;
            background-color: lightblue;
        }

        .box-fixed {
            width: 100px;
            height: 100px;
            background-color: purple;
            position: fixed; /* 设置为固定定位 */
            right: 300px; /* 距离浏览器窗口右边300px */
            bottom: 50px; /* 距离浏览器窗口底部50px */
        }
    </style>
</head>
<body>
    <h1>相对定位</h1>
    <div class="box1">
        <div class="box-normal"></div>
        <div class="box-relative"></div>
        <div class="box-normal"></div>
    </div>

    <h1>绝对定位</h1>
    <div class="box2">
        <div class="box-normal"></div>
        <div class="box-absolute"></div>
        <div class="box-normal"></div>
    </div>

    <h1>固定定位</h1>
    <div class="box3">
        <div class="box-normal"></div>
        <div class="box-fixed"></div>
        <div class="box-normal"></div>
    </div>
</body>
</html>
