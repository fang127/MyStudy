<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML属性</title>
</head>
<body>
    <!-- 属性是 HTML 元素提供的附加信息 -->
    <!-- 属性通常出现在 HTML 标签的开始标签中，用于定义元素的行为、样式、内容或其他特性 -->
    <!-- 属性总是以 name="value" 的形式写在标签内，name 是属性的名称，value 是属性的值 -->
    <!-- a为链接地址, href属性定义了地址，target属性定义打开方式-->
    <a href="https://docs.genksman.com">这是一个超链接</a>
    <!-- br表示换行 -->
    <br>
    <a href="https://docs.genksman.com" target="_blank">这是一个超链接</a>
    <!-- hr表示创建一条水平分割线 -->
    <hr>
    <!-- img表示图片，src表示图片路径，alt表示图片的替代文本(如果图片无法被浏览器加载，则显示该文本) -->
    <!-- width表示图片宽，height表示图片高 -->
    <!-- 本地图片，可以以当前html的相对路径或者绝对路径表示 -->
    <img src="..\sources\image.png" alt="" width="200" height="100">
    <br>
    <img src="mage.png" alt="该图片无法显示">
    <br>
    <!-- 网络图片，src属性值为图片的URL地址 -->
    <img src="https://pic3.zhimg.com/v2-d1f733345b0d11ea4d1bde0e2511dbc8_720w.jpg?source=172ae18b" alt="">
    <br>
</body>
</html>
