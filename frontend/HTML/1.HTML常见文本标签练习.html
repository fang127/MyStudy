<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>常见文本标签练习</title>
</head>
<body>
    <!-- HTML 标题（Heading）是通过<h1> - <h6> 标签来定义的（最多六级） -->
    <h1>一级标题标签</h1>
    <h2>二级标题标签</h2>
    <h3>三级标题标签</h3>
    <h4>四级标题标签</h4>
    <h5>五级标题标签</h5>
    <h6>六级标题标签</h6>
    <!-- HTML 段落是通过标签 <p> 来定义的 -->
    <p>这是一个段落</p>
    <p>更改文本样式，<b>字体加粗</b>，<i>斜体</i>，<u>下划线</u>，<s>删除线</s></p>

    <ul>
        <li>无序列表元素 1</li>
        <li>无序列表元素 2</li>
        <li>无序列表元素 3</li>
    </ul>

    <ol>
        <li>有序列表元素 1</li>
        <li>有序列表元素 2</li>
        <li>有序列表元素 3</li>
    </ol>

    <!-- 表格 -->
    <!-- border表示加边框，宽度为1 -->
    <table border="1">
        <!-- tr(table row)为表格行 -->
        <tr>
            <!-- th(table header)为表格头部 -->
            <th>姓名</th>
            <th>年龄</th>
            <th>性别</th>
        </tr>
        <tr>
            <!-- td(table data)为表格数据-->
            <td>harry</td>
            <td>18</td>
            <td>男</td>
        </tr>
        <tr>
            <td>张三</td>
            <td>25</td>
            <td>男</td>
        </tr>
    </table>
</body>
</html>
