<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS选择器</title>

    <style>
        /* 元素选择器 */
        h2 {
            color: aqua;
        }

        /* 类选择器，以.(类名)表示 */
        .highlight {
            background-color: yellow;
        }

        /* 元素选择器 */
        h3 {
            background-color: lightgray;
        }

        /* ID选择器，以#(ID)表示 */
        #header {
            color: red;
            font-size: 20px;
        }

        /* 通用选择器，通过通配符选择器(*)设置全局字体 */
        * {
            font-family: "KaiTi";
        }

        /* 子元素选择器，选择父元素下的直接子元素 */
        .father > .son {
            color: green;
        }

        /* 后代选择器，选择父元素下的所有后代元素 */
        .father p {
            color: blue;
        }

        .father .grandson {
            color: yellow;
        }

        /* 相邻元素选择器，选择紧接在另一个元素之后的元素 */
        h3 + p {
            color: purple;
        }

        /* 并集选择器，选择多个元素 */
        h4, h5, h6 {
            color: orange;
        }

        /* 伪类选择器 */
        #element:hover {
            color: pink;
        }
    </style>
</head>
<body>
    <h1>不同类型的CSS选择器</h1>
    <h2>这是一个元素选择器示例</h2>
    <!-- 类选择器可以避免被元素选择器选择，可以单独设置元素选择器内的某个元素的样式 -->
    <h3 class="highlight">这是一个类选择器示例</h3>
    <h3>这是另一个类选择器示例</h3>
    <h4 id="header">这是一个ID选择器</h4>

    <div class="father">
        <p class="son">这是一个子元素选择器示例</p>
        <div>
            <p>这是一个后代选择器示例</p>
            <p class="grandson">这是一个后代选择器示例</p>
        </div>
    </div>

    <p>这是一个普通的p标签</p>
    <h3>这是一个相邻元素选择器示例</h3>
    <p>这是另一个p标签</p>

    <h4>这是一个并集选择器示例</h4>
    <h5>这是一个并集选择器示例</h5>
    <h6>这是一个并集选择器示例</h6>

    <p id="element">这是一个伪类选择器示例，鼠标悬停时会变成粉色</p>
</body>
</html>
