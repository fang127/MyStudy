<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS DOM表格的增删改查</title>

    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1 style="text-align:center">表格的增删改查</h1>
    <button onclick="addRowData()" >新增数据</button>
    <table id="table">
        <tr>
            <th>姓名</th>
            <th>年龄</th>
            <th>性别</th>
            <th>操作</th>
        </tr>
        <tr>
            <td>张三</td>
            <td>20</td>
            <td>男</td>
            <td>
                <button onclick="modifyRowData(this)">修改</button>
                <button onclick="deleteRowData(this)">删除</button>
            </td>
        </tr>
        <tr>
            <td>李四</td>
            <td>19</td>
            <td>男</td>
            <td>
                <button onclick="modifyRowData(this)">修改</button>
                <button onclick="deleteRowData(this)">删除</button>
            </td>
        </tr>
    </table>

    <script src="../JavaScript/table.js"></script>
</body>
</html>
