<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS导入方式</title>
    <!-- 外部样式表通过link标签引入 -->
    <link rel="stylesheet" href="../CSS/styles.css">

    <!-- 内部样式表 -->
    <!-- 内部样式表定义样式在头部 -->
    <style>
        p {
            color: blue;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <p>这是一个应用了CSS的段落</p>
    <!-- 行内样式 -->
    <h1 style="color: green">这是一个一级标题，应用行内样式</h1>
    <p style="color: red; font-size: 18px;">这是一个应用了行内样式的段落</p>
    <!-- 外部样式 -->
    <!-- 外部样式表通过link标签引入 -->
    <h2>这是一个二级标题，应用外部样式</h2>
</body>
</html>
