<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS导入方式</title>
    <!-- 打印顺序， head标签-外部-Body标签 -->
    <!-- 内联样式 -->
    <script>
        console.log("hello world");
    </script>

    <script src="../JavaScript/myscript.js"></script>
</head>
<body>
    <h1>JS导入方式</h1>
    <!-- 内联样式 -->
    <script>
        console.log("hello world");
        alert("你好，内联样式弹窗");
    </script>
</body>
</html>
