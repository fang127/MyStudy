<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML区块</title>
</head>
<body>
    <!-- div标签是一个块级标签，没有语义，只是用于组织内容 -->
    <!-- div标签可以包含其他HTML元素，可以用来创建布局、分组内容或应用样式 -->
    <div class="nav">
        <a href="#">链接 1</a>
        <a href="#">链接 2</a>
        <a href="#">链接 3</a>
        <a href="#">链接 4</a>
        <a href="#">链接 5</a>
    </div>

    <!-- 内容区域 -->
    <div class="content">
        <h1>文章标题</h1>
        <p>文章内容</p>
        <p>文章内容</p>
        <p>文章内容</p>
        <p>文章内容</p>
        <p>文章内容</p>
    </div>

    <!-- span标签类似没有内容的a标签或p标签 -->
    <!-- 作用是将内部的内容包装起来，便与使用css或js行为 -->
    <!-- span标签是一个行内标签，没有语义，只是用于组织内容 -->
    <!-- span标签可以包含其他HTML元素，可以用来应用样式或分组内容 -->
    <span>这是第 1 个 span 标签</span>
    <span>这是第 2 个 span 标签</span>
    <span>这是第 3 个 span 标签</span>
    <span>这是第 4 个 span 标签</span>
    <hr>
    <span>链接点击这里 <a href="a">链接</a></span>
</body>
</html>
